<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 340" role="img" aria-labelledby="title desc">
  <title id="title">Unijord write and replay flow</title>
  <desc id="desc">Events are captured locally, sealed into immutable segments, stored on object storage, and read directly by replay programs in any language.</desc>

  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #dbe3ea; stroke-width: 1.5; }
      .box-strong { fill: #f0fdfa; stroke: #99f6e4; stroke-width: 1.5; }
      .ink { fill: #111827; }
      .muted { fill: #64748b; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .accent { fill: url(#accent); }
      .label { font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="340" rx="24"/>

  <text x="48" y="44" class="ink label">Write close to the source. Replay directly from object storage.</text>
  <text x="48" y="68" class="muted small">Unijord keeps event timelines as immutable segment files plus bounded catalog metadata.</text>

  <g transform="translate(46 108)">
    <rect class="box" x="0" y="0" width="172" height="112" rx="18"/>
    <text x="22" y="34" class="ink label">Agents / Apps</text>
    <text x="22" y="58" class="muted small">tool calls</text>
    <text x="22" y="78" class="muted small">workflow steps</text>
    <text x="22" y="98" class="muted small">host events</text>
  </g>

  <path class="line" d="M232 164 H304"/>

  <g transform="translate(316 108)">
    <rect class="box-strong" x="0" y="0" width="172" height="112" rx="18"/>
    <text x="22" y="34" class="ink label">Local Writer</text>
    <text x="22" y="58" class="muted small">ordered append</text>
    <text x="22" y="78" class="muted small">local capture</text>
    <text x="22" y="98" class="muted small">segment roll</text>
  </g>

  <path class="line" d="M502 164 H574"/>

  <g transform="translate(586 98)">
    <rect class="box" x="0" y="0" width="178" height="132" rx="18"/>
    <text x="22" y="34" class="ink label">Object Storage</text>
    <text x="22" y="58" class="muted small">S3 / GCS / Azure</text>
    <text x="22" y="78" class="muted small">MinIO compatible</text>

    <g transform="translate(24 92)">
      <rect class="accent" x="0" y="0" width="32" height="16" rx="5"/>
      <rect class="ink" x="42" y="0" width="32" height="16" rx="5" opacity="0.9"/>
      <rect class="ink" x="84" y="0" width="32" height="16" rx="5" opacity="0.65"/>
      <text x="0" y="32" class="muted tiny">segments + catalog</text>
    </g>
  </g>

  <path class="line" d="M778 164 H866"/>

  <g transform="translate(882 108)">
    <rect class="box" x="0" y="0" width="178" height="112" rx="18"/>
    <text x="22" y="34" class="ink label">Replay Readers</text>
    <text x="22" y="58" class="muted small">Go / Python</text>
    <text x="22" y="78" class="muted small">Spark / DuckDB</text>
    <text x="22" y="98" class="muted small">any language</text>
  </g>

  <g transform="translate(586 250)">
    <path d="M0 0 H420" stroke="#cbd5e1" stroke-width="2" fill="none"/>
    <path d="M40 0 H138" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="40" cy="0" r="5" class="accent"/>
    <circle cx="138" cy="0" r="5" class="accent"/>
    <text x="0" y="30" class="muted small">Replay programs range-read segment bytes directly from blob storage.</text>
    <text x="0" y="52" class="muted small">No broker is needed in the finalized-history read path.</text>
  </g>
</svg>
