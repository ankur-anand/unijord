<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">Traditional broker streaming compared with Unijord</title>
  <desc id="desc">A side-by-side animated comparison. Traditional systems send many producers into a predefined broker topic and readers consume broker partitions. Unijord writers create owned timelines on object storage and readers replay finalized files directly.</desc>

  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <marker id="arrow-dark" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0284c7"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #dbe3ea; stroke-width: 1.5; }
      .panel-soft { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.4; }
      .panel-hot { fill: #f0fdfa; stroke: #99f6e4; stroke-width: 1.4; }
      .panel-warm { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.4; }
      .panel-blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.4; }
      .ink { fill: #111827; }
      .muted { fill: #64748b; }
      .soft { fill: #94a3b8; }
      .accent { fill: url(#accent); }
      .line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow-dark); }
      .line-soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; stroke-dasharray: 5 6; marker-end: url(#arrow-dark); }
      .line-read { stroke: #0284c7; stroke-width: 2.2; fill: none; marker-end: url(#arrow-blue); }
      .title { font: 750 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .section { font: 750 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font: 700 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font: 600 11.5px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 650 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .packet { opacity: 0.95; }
      .packet-dark { fill: #475569; }
      .packet-blue { fill: #0284c7; }
      .packet-teal { fill: #0f766e; }
      .packet-orange { fill: #f97316; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="680" rx="28"/>

  <text x="48" y="54" class="ink title">Broker-centered streams vs object-storage event memory</text>
  <text x="48" y="82" class="muted body">Traditional systems route producers through broker-managed topics. Unijord stores owned histories as open files that any reader can replay from blob storage.</text>

  <!-- Traditional panel -->
  <g transform="translate(40 116)">
    <rect class="panel" x="0" y="0" width="530" height="500" rx="26"/>
    <text x="28" y="42" class="ink section">Traditional broker stream</text>
    <text x="28" y="68" class="muted body">Producers target a shared topic. The broker owns partitions and replicas.</text>

    <!-- Producers -->
    <g transform="translate(28 118)">
      <rect class="panel-soft" x="0" y="0" width="136" height="50" rx="14"/>
      <text x="18" y="23" class="ink label">app</text>
      <text x="18" y="40" class="muted tiny">produce event</text>
    </g>
    <g transform="translate(28 208)">
      <rect class="panel-soft" x="0" y="0" width="136" height="50" rx="14"/>
      <text x="18" y="23" class="ink label">agent</text>
      <text x="18" y="40" class="muted tiny">produce event</text>
    </g>
    <g transform="translate(28 298)">
      <rect class="panel-soft" x="0" y="0" width="136" height="50" rx="14"/>
      <text x="18" y="23" class="ink label">service</text>
      <text x="18" y="40" class="muted tiny">produce event</text>
    </g>

    <!-- Broker -->
    <g transform="translate(200 118)">
      <rect class="panel-warm" x="0" y="0" width="178" height="230" rx="20"/>
      <text x="22" y="30" class="ink label">Broker cluster</text>
      <text x="22" y="50" class="muted tiny">topic: events</text>
      <g transform="translate(20 74)">
        <rect class="bg" x="0" y="0" width="138" height="32" rx="9"/>
        <text x="14" y="21" class="mono muted">partition 0</text>
        <circle class="soft" cx="114" cy="16" r="3"/>
        <circle class="soft" cx="124" cy="16" r="3"/>
      </g>
      <g transform="translate(20 118)">
        <rect class="bg" x="0" y="0" width="138" height="32" rx="9"/>
        <text x="14" y="21" class="mono muted">partition 1</text>
        <circle class="soft" cx="114" cy="16" r="3"/>
        <circle class="soft" cx="124" cy="16" r="3"/>
      </g>
      <g transform="translate(20 162)">
        <rect class="bg" x="0" y="0" width="138" height="32" rx="9"/>
        <text x="14" y="21" class="mono muted">partition 2</text>
        <circle class="soft" cx="114" cy="16" r="3"/>
        <circle class="soft" cx="124" cy="16" r="3"/>
      </g>
    </g>

    <!-- Consumers -->
    <g transform="translate(418 158)">
      <rect class="panel-blue" x="0" y="0" width="84" height="56" rx="14"/>
      <text x="16" y="24" class="ink label">reader</text>
      <text x="16" y="42" class="muted tiny">partition</text>
    </g>
    <g transform="translate(418 278)">
      <rect class="panel-blue" x="0" y="0" width="84" height="56" rx="14"/>
      <text x="16" y="24" class="ink label">job</text>
      <text x="16" y="42" class="muted tiny">partition</text>
    </g>

    <!-- Static lines -->
    <path class="line-soft" d="M164 143 H188"/>
    <path class="line-soft" d="M164 233 H188"/>
    <path class="line-soft" d="M164 323 H188"/>
    <path class="line" d="M378 186 H406"/>
    <path class="line" d="M378 306 H406"/>

    <!-- Animated event packets -->
    <g transform="translate(164 143)">
      <circle class="packet packet-orange" r="5">
        <animateMotion dur="2.8s" repeatCount="indefinite" path="M0 0 H24"/>
      </circle>
    </g>
    <g transform="translate(164 233)">
      <circle class="packet packet-orange" r="5">
        <animateMotion dur="2.8s" begin="0.5s" repeatCount="indefinite" path="M0 0 H24"/>
      </circle>
    </g>
    <g transform="translate(164 323)">
      <circle class="packet packet-orange" r="5">
        <animateMotion dur="2.8s" begin="1s" repeatCount="indefinite" path="M0 0 H24"/>
      </circle>
    </g>
    <g transform="translate(378 186)">
      <circle class="packet packet-dark" r="5">
        <animateMotion dur="2.4s" begin="0.25s" repeatCount="indefinite" path="M0 0 H28"/>
      </circle>
    </g>
    <g transform="translate(378 306)">
      <circle class="packet packet-dark" r="5">
        <animateMotion dur="2.4s" begin="0.9s" repeatCount="indefinite" path="M0 0 H28"/>
      </circle>
    </g>

    <g transform="translate(28 402)">
      <rect class="panel-soft" x="0" y="0" width="474" height="76" rx="16"/>
      <text x="20" y="24" class="ink tiny">Shape</text>
      <text x="78" y="24" class="muted body">shared topic, fixed partitions</text>
      <text x="20" y="45" class="ink tiny">HA</text>
      <text x="78" y="45" class="muted body">broker-managed partition replicas</text>
      <text x="20" y="66" class="ink tiny">Read</text>
      <text x="78" y="66" class="muted body">consumers read through brokers</text>
    </g>
  </g>

  <!-- Unijord panel -->
  <g transform="translate(610 116)">
    <rect class="panel" x="0" y="0" width="530" height="500" rx="26"/>
    <text x="28" y="42" class="ink section">Unijord stream journal</text>
    <text x="28" y="68" class="muted body">Writers own local timelines. Any runtime can replay files from blob storage.</text>

    <!-- Writers -->
    <g transform="translate(28 112)">
      <rect class="panel-hot" x="0" y="0" width="148" height="62" rx="16"/>
      <text x="18" y="25" class="ink label">host-a</text>
      <text x="18" y="44" class="muted tiny">owned timeline</text>
    </g>
    <g transform="translate(28 204)">
      <rect class="panel-hot" x="0" y="0" width="148" height="62" rx="16"/>
      <text x="18" y="25" class="ink label">agent run</text>
      <text x="18" y="44" class="muted tiny">owned timeline</text>
    </g>
    <g transform="translate(28 296)">
      <rect class="panel-hot" x="0" y="0" width="148" height="62" rx="16"/>
      <text x="18" y="25" class="ink label">workflow</text>
      <text x="18" y="44" class="muted tiny">owned timeline</text>
    </g>

    <!-- Object store -->
    <g transform="translate(222 112)">
      <rect class="panel-soft" x="0" y="0" width="166" height="246" rx="20"/>
      <text x="20" y="30" class="ink label">Object store</text>
      <text x="20" y="50" class="muted tiny">durable history</text>
      <g transform="translate(18 76)">
        <rect class="panel-warm" x="0" y="0" width="130" height="38" rx="11"/>
        <text x="16" y="24" class="muted tiny">registry</text>
      </g>
      <g transform="translate(18 126)">
        <rect class="panel-blue" x="0" y="0" width="130" height="38" rx="11"/>
        <text x="16" y="24" class="muted tiny">catalog</text>
      </g>
      <g transform="translate(18 176)">
        <rect class="panel-hot" x="0" y="0" width="130" height="38" rx="11"/>
        <text x="16" y="24" class="muted tiny">segments</text>
      </g>
    </g>

    <!-- Readers -->
    <g transform="translate(424 126)">
      <rect class="panel-blue" x="0" y="0" width="88" height="54" rx="14"/>
      <text x="12" y="23" class="ink label">Go/Py</text>
      <text x="12" y="40" class="muted tiny">blob replay</text>
    </g>
    <g transform="translate(424 222)">
      <rect class="panel-blue" x="0" y="0" width="88" height="54" rx="14"/>
      <text x="12" y="23" class="ink label">Spark</text>
      <text x="12" y="40" class="muted tiny">SQL replay</text>
    </g>
    <g transform="translate(424 318)">
      <rect class="panel-blue" x="0" y="0" width="88" height="54" rx="14"/>
      <text x="12" y="23" class="ink label">Any tool</text>
      <text x="12" y="40" class="muted tiny">open file</text>
    </g>

    <!-- Static lines -->
    <path class="line" d="M176 143 H210"/>
    <path class="line" d="M176 235 H210"/>
    <path class="line" d="M176 327 H210"/>
    <path class="line-read" d="M388 153 H412"/>
    <path class="line-read" d="M388 249 H412"/>
    <path class="line-read" d="M388 345 H412"/>

    <!-- Animated event packets -->
    <g transform="translate(176 143)">
      <circle class="packet packet-teal" r="5">
        <animateMotion dur="2.8s" repeatCount="indefinite" path="M0 0 H34"/>
      </circle>
    </g>
    <g transform="translate(176 235)">
      <circle class="packet packet-teal" r="5">
        <animateMotion dur="2.8s" begin="0.45s" repeatCount="indefinite" path="M0 0 H34"/>
      </circle>
    </g>
    <g transform="translate(176 327)">
      <circle class="packet packet-teal" r="5">
        <animateMotion dur="2.8s" begin="0.9s" repeatCount="indefinite" path="M0 0 H34"/>
      </circle>
    </g>
    <g transform="translate(388 153)">
      <circle class="packet packet-blue" r="5">
        <animateMotion dur="2.4s" begin="0.2s" repeatCount="indefinite" path="M0 0 H24"/>
      </circle>
    </g>
    <g transform="translate(388 249)">
      <circle class="packet packet-blue" r="5">
        <animateMotion dur="2.4s" begin="0.75s" repeatCount="indefinite" path="M0 0 H24"/>
      </circle>
    </g>
    <g transform="translate(388 345)">
      <circle class="packet packet-blue" r="5">
        <animateMotion dur="2.4s" begin="1.15s" repeatCount="indefinite" path="M0 0 H24"/>
      </circle>
    </g>

    <g transform="translate(28 402)">
      <rect class="panel-soft" x="0" y="0" width="474" height="76" rx="16"/>
      <text x="20" y="24" class="ink tiny">Shape</text>
      <text x="78" y="24" class="muted body">owned timelines as open files</text>
      <text x="20" y="45" class="ink tiny">HA</text>
      <text x="78" y="45" class="muted body">object-store durability, no broker replicas to manage</text>
      <text x="20" y="66" class="ink tiny">Read</text>
      <text x="78" y="66" class="muted body">any language or tool can range-read blob files</text>
    </g>
  </g>
</svg>
