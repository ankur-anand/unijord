syntax = "proto3";

package eventlake.v1;

import "google/api/annotations.proto";

option go_package = "github.com/ankur-anand/unijord/gen/go/eventlake/v1;eventlakev1";

// EventLake exposes the public control-plane and data-plane RPCs.
// The same service can also be used internally between gateway, writer, and
// reader roles, with each runtime implementing only the RPCs it owns.
service EventLakeService {
  // Control-plane RPCs exposed through the same gateway as REST and gRPC.
  // REST is served by grpc-gateway using the annotations below.
  //
  // The gateway process can terminate both protocols on the same listener and
  // route to the appropriate backend role internally.
  //
  // Namespace management
  //
  // POST /api/namespaces
  // GET  /api/namespaces/{name}
  // GET  /api/namespaces
  // DELETE /api/namespaces/{name}
  //
  // Data plane
  //
  // POST /api/namespaces/{namespace}/produce
  // POST /api/namespaces/{namespace}/produce/batch
  // GET  /api/namespaces/{namespace}/consume
  // GET  /api/namespaces/{namespace}/tail
  // POST /api/namespaces/{namespace}/flush
  //
  // System
  //
  // GET /api/overview
  // GET /api/health
  //
  rpc CreateNamespace(CreateNamespaceRequest) returns (CreateNamespaceResponse) {
    option (google.api.http) = {
      post: "/api/namespaces"
      body: "*"
    };
  }
  rpc GetNamespace(GetNamespaceRequest) returns (GetNamespaceResponse) {
    option (google.api.http) = {
      get: "/api/namespaces/{name}"
    };
  }
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse) {
    option (google.api.http) = {
      get: "/api/namespaces"
    };
  }
  rpc DeleteNamespace(DeleteNamespaceRequest) returns (DeleteNamespaceResponse) {
    option (google.api.http) = {
      delete: "/api/namespaces/{name}"
    };
  }

  rpc Produce(ProduceRequest) returns (ProduceResponse) {
    option (google.api.http) = {
      post: "/api/namespaces/{namespace}/produce"
      body: "*"
    };
  }
  rpc ProduceBatch(ProduceBatchRequest) returns (ProduceBatchResponse) {
    option (google.api.http) = {
      post: "/api/namespaces/{namespace}/produce/batch"
      body: "*"
    };
  }
  rpc Consume(ConsumeRequest) returns (ConsumeResponse) {
    option (google.api.http) = {
      get: "/api/namespaces/{namespace}/consume"
    };
  }
  rpc Tail(TailRequest) returns (stream TailResponse) {
    option (google.api.http) = {
      get: "/api/namespaces/{namespace}/tail"
    };
  }
  rpc Flush(FlushRequest) returns (FlushResponse) {
    option (google.api.http) = {
      post: "/api/namespaces/{namespace}/flush"
      body: "*"
    };
  }

  rpc Overview(OverviewRequest) returns (OverviewResponse) {
    option (google.api.http) = {
      get: "/api/overview"
    };
  }
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/api/health"
    };
  }
}

message Namespace {
  string name = 1;
  string prefix = 2;
  int32 partitions = 3;
  string retention_policy = 4;
  uint32 memtable_size_mb = 5;
  uint32 flush_interval_ms = 6;
}

message Event {
  // 24-char hex encoding of the 12-byte time-ordered Event Lake key.
  string event_id = 1;
  string namespace = 2;
  int32 partition = 3;
  uint64 timestamp_ms = 4;
  bytes value = 5;
}

message CreateNamespaceRequest {
  string name = 1;
  int32 partitions = 2;
  string retention_policy = 3;
  uint32 memtable_size_mb = 4;
  uint32 flush_interval_ms = 5;
}

message CreateNamespaceResponse {
  Namespace namespace = 1;
}

message GetNamespaceRequest {
  string name = 1;
}

message GetNamespaceResponse {
  Namespace namespace = 1;
}

message ListNamespacesRequest {}

message ListNamespacesResponse {
  repeated Namespace namespaces = 1;
}

message DeleteNamespaceRequest {
  string name = 1;
}

message DeleteNamespaceResponse {
  string name = 1;
}

message ProduceRequest {
  string namespace = 1;
  bytes value = 2;
  string route_key = 3;
  optional int32 partition = 4;
}

message ProduceResponse {
  string event_id = 1;
  int32 partition = 2;
}

message ProduceBatchItem {
  bytes value = 1;
  string route_key = 2;
  optional int32 partition = 3;
}

message ProduceBatchRequest {
  string namespace = 1;
  repeated ProduceBatchItem events = 2;
}

message ProduceBatchResult {
  string event_id = 1;
  int32 partition = 2;
}

message ProduceBatchResponse {
  // Results are returned in the same order as the request items.
  repeated ProduceBatchResult results = 1;
}

message ConsumeRequest {
  string namespace = 1;
  // Exclusive cursor; events strictly after this ID are returned.
  string start_after = 2;
  // If limit <= 0, the server applies its default page size.
  int32 limit = 3;
  optional int32 partition = 4;
}

message ConsumeResponse {
  repeated Event events = 1;
  // Cursor for the next page; empty when the server has no newer events.
  string next_cursor = 2;
}

message TailRequest {
  string namespace = 1;
  string start_after = 2;
  optional int32 partition = 3;
}

message TailResponse {
  Event event = 1;
}

message FlushRequest {
  string namespace = 1;
  // If unset, the namespace flushes all partitions.
  optional int32 partition = 2;
}

message FlushResponse {
  uint32 flushed_partitions = 1;
}

message OverviewRequest {}

message OverviewResponse {
  uint32 active_namespaces = 1;
  uint32 active_partitions = 2;
  uint64 total_stored_bytes = 3;
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string status = 2;
  string mode = 3;
}
