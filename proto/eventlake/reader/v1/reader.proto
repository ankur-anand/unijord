syntax = "proto3";

package eventlake.reader.v1;

import "google/api/annotations.proto";

option go_package = "github.com/ankur-anand/unijord/gen/go/eventlake/reader/v1;readerv1";

service ReaderService {
  rpc ListPartitionHeads(ListPartitionHeadsRequest) returns (ListPartitionHeadsResponse) {
    option (google.api.http) = {
      get: "/api/partitions/heads"
    };
  }

  rpc GetPartitionHead(GetPartitionHeadRequest) returns (GetPartitionHeadResponse) {
    option (google.api.http) = {
      get: "/api/partitions/{partition}/head"
    };
  }

  rpc ConsumePartition(ConsumePartitionRequest) returns (ConsumePartitionResponse) {
    option (google.api.http) = {
      get: "/api/partitions/{partition}/consume"
    };
  }

  rpc ConsumePartitionFromTimestamp(ConsumePartitionFromTimestampRequest) returns (ConsumePartitionResponse) {
    option (google.api.http) = {
      get: "/api/partitions/{partition}/consume-from-timestamp"
    };
  }

  rpc TailPartition(TailPartitionRequest) returns (stream TailPartitionResponse) {
    option (google.api.http) = {
      get: "/api/partitions/{partition}/tail"
    };
  }
}

message PartitionEvent {
  int32 partition = 1;
  uint64 lsn = 2;
  uint64 timestamp_ms = 3;
  bytes value = 4;
}

message PartitionHead {
  int32 partition = 1;
  uint64 head_lsn = 2;
  uint64 oldest_available_lsn = 3;
}

message ListPartitionHeadsRequest {}

message ListPartitionHeadsResponse {
  repeated PartitionHead heads = 1;
}

message GetPartitionHeadRequest {
  int32 partition = 1;
}

message GetPartitionHeadResponse {
  int32 partition = 1;
  uint64 head_lsn = 2;
  uint64 oldest_available_lsn = 3;
}

message ConsumePartitionRequest {
  int32 partition = 1;
  uint64 start_after_lsn = 2;
  uint32 limit = 3;
}

message ConsumePartitionFromTimestampRequest {
  int32 partition = 1;
  uint64 timestamp_ms = 2;
  uint32 limit = 3;
}

message ConsumePartitionResponse {
  repeated PartitionEvent events = 1;
  uint64 next_start_after_lsn = 2;
  uint64 head_lsn = 3;
  uint64 oldest_available_lsn = 4;
}

message TailPartitionRequest {
  int32 partition = 1;
  optional uint64 start_after_lsn = 2;
}

message TailPartitionResponse {
  PartitionEvent event = 1;
}
